<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRAYNOCTIS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a84c;
  --gold-dim: #8a6f2e;
  --bg: #080808;
  --text: #e8e0d0;
  --text-dim: #8a8070;
  --white: #f5f0e8;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
}

/* Grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* Grid background */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
}

/* Vignette */
#vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 65% 65% at 50% 50%, transparent 30%, #080808 100%);
  pointer-events: none;
  z-index: 1;
}

/* ── Page system ── */
.page {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  z-index: 2;
  padding: 2rem;
}
.page.active {
  opacity: 1;
  pointer-events: all;
}

/* ── Stage (orrery) ── */
.stage {
  position: relative;
  width: 320px;
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
  flex-shrink: 0;
}

/* Rings */
.ring-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.15);
  animation: spinFwd 40s linear infinite;
}
.ring-outer::before {
  content: '';
  position: absolute;
  top: -3px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}
.ring-outer::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold-dim);
  box-shadow: 0 0 6px var(--gold-dim);
}
.ring-mid {
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.25);
  animation: spinRev 25s linear infinite;
}
.ring-mid::before, .ring-mid::after {
  content: '';
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
}
.ring-mid::before { top: -2.5px; right: 40%; }
.ring-mid::after  { bottom: -2.5px; left: 40%; }

.ring-inner {
  position: absolute;
  inset: 52px;
  border-radius: 50%;
  border: 0.5px solid rgba(201,168,76,0.12);
  animation: spinFwd 18s linear infinite reverse;
}

.glow {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
  animation: pulse 4s ease-in-out infinite;
}

/* ── Orbit icons ── */
/* Outer ring: 5 icons evenly at 72° each, starting from top (−90°) */
.orbits-outer {
  position: absolute;
  inset: 0;
  animation: spinFwd 20s linear infinite;
}
/* Positions for 5 icons on outer ring radius ~160px from center */
/* angles: -90, -18, 54, 126, 198 deg */
.orbits-outer .orbit-item:nth-child(1) { top: -17px;             left: calc(50% - 17px); }          /* top */
.orbits-outer .orbit-item:nth-child(2) { top: calc(50% - 120px); right: -7px; }                      /* upper-right */
.orbits-outer .orbit-item:nth-child(3) { bottom: calc(50% - 142px); right: 10px; }                   /* lower-right */
.orbits-outer .orbit-item:nth-child(4) { bottom: calc(50% - 142px); left: 10px; }                    /* lower-left */
.orbits-outer .orbit-item:nth-child(5) { top: calc(50% - 120px); left: -7px; }                       /* upper-left */

.orbit-item {
  position: absolute;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.6;
  transition: opacity 0.3s, filter 0.3s;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
}
.orbit-item:hover {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.9));
}
/* Counter-rotate so icons stay upright */
.orbit-item svg { animation: spinRev 20s linear infinite; }

/* ── Center pieces ── */
.king-wrap {
  position: relative;
  z-index: 3;
  animation: float 6s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
}
.king-wrap svg { width: 120px; height: 120px; }

.center-icon {
  position: relative;
  z-index: 3;
  animation: float 6s ease-in-out infinite;
  filter: drop-shadow(0 0 22px rgba(201,168,76,0.4));
  width: 100px; height: 100px;
  display: none;
  align-items: center; justify-content: center;
}
.center-icon svg { width: 100%; height: 100%; }
.center-icon.visible { display: flex; }

/* ── Typography ── */
.page-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--white);
  text-align: center;
}
.noctis-hover {
  color: inherit;
  transition: color 0.4s ease;
  cursor: default;
}
.noctis-hover:hover { color: var(--gold); }

#lang-cycle {
  display: inline-block;
  transition: opacity 0.5s ease;
}
.tagline {
  font-family: 'EB Garamond', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-top: 0.5rem;
  text-align: center;
}

/* Section content — hidden by default, fades in */
.section-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
  pointer-events: none;
}
.section-content.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.section-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--white);
  text-align: center;
}
.section-label span { color: var(--gold); }

.section-desc {
  font-family: 'EB Garamond', serif;
  font-size: 1.05rem;
  font-style: italic;
  color: var(--text-dim);
  text-align: center;
  max-width: 440px;
  line-height: 1.75;
  margin-top: 0.6rem;
}

.divider {
  width: 100px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  margin: 1.2rem auto 0;
}

/* Back button */
.back-btn {
  position: fixed;
  top: 2rem; left: 2rem;
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  z-index: 100;
  transition: color 0.3s, opacity 0.4s;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
}
.back-btn::before { content: '← '; }
.back-btn.visible { opacity: 1; pointer-events: all; }
.back-btn:hover { color: var(--gold); }

/* Art grid */
.art-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 480px;
  width: 100%;
  margin-top: 1.5rem;
}
.art-slot {
  aspect-ratio: 1;
  border: 1px dashed rgba(201,168,76,0.18);
  background: rgba(201,168,76,0.02);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.3s, background 0.3s;
  cursor: pointer;
}
.art-slot:hover {
  border-color: rgba(201,168,76,0.45);
  background: rgba(201,168,76,0.05);
}
.art-slot svg { opacity: 0.18; }

@keyframes spinFwd { to { transform: rotate(360deg); } }
@keyframes spinRev { to { transform: rotate(-360deg); } }
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.15); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
</style>
</head>
<body>

<div id="vignette"></div>
<button class="back-btn" id="backBtn" onclick="goHome()">Home</button>

<!-- Hidden SVG symbols -->
<svg style="display:none">
  <symbol id="ico-gamedev" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="6" width="20" height="12" rx="2"/>
    <path d="M12 14v-4M10 12h4"/>
    <circle cx="17.5" cy="11.5" r="0.7" fill="#c9a84c" stroke="none"/>
    <circle cx="19.5" cy="13.5" r="0.7" fill="#c9a84c" stroke="none"/>
  </symbol>
  <symbol id="ico-writing" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
  </symbol>
  <symbol id="ico-coding" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </symbol>
  <symbol id="ico-art" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2v-.5c0-.55.45-1 1-1h1c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/>
    <circle cx="8.5"  cy="10.5" r="1.5" fill="#c9a84c" stroke="none"/>
    <circle cx="12.5" cy="7.5"  r="1.5" fill="#c9a84c" stroke="none"/>
    <circle cx="16"   cy="11"   r="1.5" fill="#c9a84c" stroke="none"/>
  </symbol>
  <symbol id="ico-chess" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 20h14M8 20l1-5H6l1-3h2V9H8V7h2V5h4v2h2v2h-1v3h2l1 3h-3l1 5"/>
  </symbol>
  <symbol id="ico-image" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </symbol>
</svg>

<!-- ══════════════ SINGLE PAGE ══════════════ -->
<div class="page active" id="page-home">
  <div class="stage">
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="ring-inner"></div>
    <div class="glow"></div>

    <!-- 5 icons on outer ring: gamedev, writing, art, coding, chess -->
    <div class="orbits-outer">
      <button class="orbit-item" onclick="goTo('gamedev')" title="Game Dev"><svg><use href="#ico-gamedev"/></svg></button>
      <button class="orbit-item" onclick="goTo('writing')"  title="Writing" ><svg><use href="#ico-writing"/></svg></button>
      <button class="orbit-item" onclick="goTo('art')"      title="Art"     ><svg><use href="#ico-art"/></svg></button>
      <button class="orbit-item" onclick="goTo('coding')"   title="Coding"  ><svg><use href="#ico-coding"/></svg></button>
      <button class="orbit-item" onclick="goTo('chess')"    title="Chess"   ><svg><use href="#ico-chess"/></svg></button>
    </div>

    <!-- King always center on home -->
    <div class="king-wrap">
      <svg viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="45" y="2"  width="10" height="24" rx="2" fill="#c9a84c"/>
        <rect x="36" y="9"  width="28" height="10" rx="2" fill="#c9a84c"/>
        <ellipse cx="50" cy="34" rx="14" ry="10" fill="#c9a84c" opacity="0.9"/>
        <rect x="40" y="42" width="20" height="6"  rx="1" fill="#8a6f2e"/>
        <path d="M32 48 Q28 72 24 90 H76 Q72 72 68 48 Z" fill="#c9a84c" opacity="0.85"/>
        <rect x="28" y="74" width="44" height="5"  rx="1" fill="#8a6f2e"/>
        <rect x="18" y="90" width="64" height="8"  rx="2" fill="#8a6f2e"/>
        <rect x="12" y="98" width="76" height="10" rx="3" fill="#c9a84c" opacity="0.7"/>
        <line x1="44" y1="52" x2="40" y2="86" stroke="rgba(255,240,180,0.25)" stroke-width="2" stroke-linecap="round"/>
        <line x1="50" y1="50" x2="50" y2="88" stroke="rgba(255,240,180,0.15)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <h1 class="page-name">STRAY<span class="noctis-hover">NOCTIS</span></h1>
  <p class="tagline"><span id="lang-cycle">Python</span></p>
</div>

<!-- ══════════════ SECTION PAGE ══════════════ -->
<!-- One shared section page that morphs content -->
<div class="page" id="page-section">
  <div class="stage">
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="ring-inner"></div>
    <div class="glow"></div>

    <!-- Orbiting icons (the other 4 sections) -->
    <div class="orbits-outer" id="section-orbits">
      <!-- populated by JS -->
    </div>

    <!-- The big center icon for the active section -->
    <div class="center-icon visible" id="section-center-icon">
      <svg><use href="#ico-gamedev" id="center-icon-use"/></svg>
    </div>
  </div>

  <div class="section-content visible" id="section-content">
    <h2 class="section-label" id="section-title">GAME <span>DEV</span></h2>
    <p class="section-desc" id="section-desc">…</p>
    <div class="divider"></div>
    <!-- Art grid only shown for art section -->
    <div class="art-grid" id="art-grid" style="display:none">
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
      <div class="art-slot"><svg width="28" height="28"><use href="#ico-image"/></svg></div>
    </div>
  </div>
</div>

<script>
  // Section data
  const sections = {
    gamedev: {
      icon: '#ico-gamedev',
      title: 'GAME <span>DEV</span>',
      desc: 'Crafting worlds where players lose themselves. Every game is a universe with its own laws — mechanics, narrative, and feel woven into one.',
      art: false,
    },
    writing: {
      icon: '#ico-writing',
      title: '<span>WRITING</span>',
      desc: 'Words are the oldest engine of imagination. Searching for the sentence that makes the reader stop and look up from the page.',
      art: false,
    },
    art: {
      icon: '#ico-art',
      title: '<span>ART</span>',
      desc: 'A gallery of works — illustrations, concepts, and visual experiments. More to come.',
      art: true,
    },
    coding: {
      icon: '#ico-coding',
      title: '<span>CODING</span>',
      desc: 'Code is creative work wearing a technical disguise. Always chasing the elegant solution hiding inside the complex problem.',
      art: false,
    },
    chess: {
      icon: '#ico-chess',
      title: '<span>CHESS</span>',
      desc: 'Sixty-four squares, infinite depth. A mirror that reveals how you think, make decisions, and recover from mistakes.',
      art: false,
    },
  };

  const allKeys = ['gamedev', 'writing', 'art', 'coding', 'chess'];

  const homeEl    = document.getElementById('page-home');
  const sectionEl = document.getElementById('page-section');
  const backBtn   = document.getElementById('backBtn');

  function goTo(key) {
    const data = sections[key];

    // Populate center icon
    document.getElementById('center-icon-use').setAttribute('href', data.icon);

    // Populate title & desc
    document.getElementById('section-title').innerHTML = data.title;
    document.getElementById('section-desc').textContent = data.desc;

    // Art grid toggle
    document.getElementById('art-grid').style.display = data.art ? 'grid' : 'none';

    // Populate orbiting icons (the other 4 + home)
    const orbitsEl = document.getElementById('section-orbits');
    orbitsEl.innerHTML = '';
    const others = allKeys.filter(k => k !== key);
    others.forEach((k, i) => {
      const btn = document.createElement('button');
      btn.className = 'orbit-item';
      btn.title = k;
      btn.innerHTML = `<svg><use href="${sections[k].icon}"/></svg>`;
      btn.onclick = () => goTo(k);
      orbitsEl.appendChild(btn);
    });
    // Add home icon as 5th
    const homeBtn = document.createElement('button');
    homeBtn.className = 'orbit-item';
    homeBtn.title = 'Home';
    homeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    homeBtn.onclick = goHome;
    orbitsEl.appendChild(homeBtn);

    // Fade home out, section in
    homeEl.classList.remove('active');
    sectionEl.classList.add('active');
    backBtn.classList.add('visible');
  }

  function goHome() {
    sectionEl.classList.remove('active');
    homeEl.classList.add('active');
    backBtn.classList.remove('visible');
  }

  // Language cycler
  const langs = ["Python", "GDScript"];
  let idx = 0;
  const el = document.getElementById("lang-cycle");
  setInterval(() => {
    el.style.opacity = "0";
    setTimeout(() => {
      idx = (idx + 1) % langs.length;
      el.textContent = langs[idx];
      el.style.opacity = "1";
    }, 500);
  }, 3000);
</script>
</body>
</html>
